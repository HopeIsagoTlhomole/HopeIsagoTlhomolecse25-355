<!-- HEADER -->
<section class="py-5 bg-light text-center">

  <div class="container">

    <h1 class="fw-bold display-5">CONTACT US</h1>

    <p class="lead">
      We would love to hear from you
    </p>

  </div>

</section>

<!-- IMAGE -->
<section class="py-4">

  <div class="container text-center">

<img src="Images/product6.jpg.jpg"class="img-fluid rounded shadow contact-banner"alt="Contact Us">

  </div>

</section>

<!-- CONTACT FORM -->
<section class="pb-5">

  <div class="container">

    <div class="row justify-content-center">

      <div class="col-lg-8">

        <div class="card shadow p-4">

          <h3 class="fw-bold mb-4 text-center">
            Send Us A Message
          </h3>

          <form>

            <!-- NAME -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Name
              </label>

              <input type="text"
              class="form-control"
              placeholder="Enter your full name"
              required>

            </div>

            <!-- EMAIL -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Email
              </label>

              <input type="email"
              class="form-control"
              placeholder="Enter your email"
              required>

            </div>

            <!-- SUBJECT -->
            <div class="mb-3">

              <label class="form-label fw-bold">Subject</label>

              <input type="text"
              class="form-control"
              placeholder="Enter subject"
              required>

            </div>

            <!-- MESSAGE -->
            <div class="mb-4">

              <label class="form-label fw-bold">
                Message
              </label>

              <textarea class="form-control"
              rows="5"
              placeholder="Type your message"
              required></textarea>

            </div>

            <!-- BUTTON -->
            <div class="text-center">

              <button type="submit"
              class="btn btn-warning btn-lg px-5 fw-bold">

                Send Message

              </button>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</section>

</section>
